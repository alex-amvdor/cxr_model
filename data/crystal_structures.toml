# Crystal structure database for cxr_feranchuk_spence.py
#
# Each table is one crystal:
#   system        : "cubic" | "hexagonal" | "tetragonal" | "orthorhombic" | "general"
#   a, b, c       : lattice constants [Angstrom] (which are required depends on system)
#   alpha/beta/gamma : cell angles in DEGREES (system = "general" only)
#   basis         : atoms in the conventional cell as { element, pos } with
#                   pos = fractional coordinates [x/a, y/b, z/c]
#
# The cell volume is computed from the lattice by the loader; it is not stored here.

[diamond]
system = "cubic"
a = 3.5668
basis = [
    { element = "C", pos = [0.00, 0.00, 0.00] },
    { element = "C", pos = [0.25, 0.25, 0.25] },
    { element = "C", pos = [0.00, 0.50, 0.50] },
    { element = "C", pos = [0.25, 0.75, 0.75] },
    { element = "C", pos = [0.50, 0.00, 0.50] },
    { element = "C", pos = [0.75, 0.25, 0.75] },
    { element = "C", pos = [0.50, 0.50, 0.00] },
    { element = "C", pos = [0.75, 0.75, 0.25] },
]

[silicon]
system = "cubic"
a = 5.4309
basis = [
    { element = "Si", pos = [0.00, 0.00, 0.00] },
    { element = "Si", pos = [0.25, 0.25, 0.25] },
    { element = "Si", pos = [0.00, 0.50, 0.50] },
    { element = "Si", pos = [0.25, 0.75, 0.75] },
    { element = "Si", pos = [0.50, 0.00, 0.50] },
    { element = "Si", pos = [0.75, 0.25, 0.75] },
    { element = "Si", pos = [0.50, 0.50, 0.00] },
    { element = "Si", pos = [0.75, 0.75, 0.25] },
]

