# 2H-WS2 / 2H-MoS2 (P6_3/mmc), isostructural with MoSe2/WSe2: metal on 2c
# (1/3,2/3,1/4), S on 4f with z = 0.621. WS2 a=3.153, c=12.323; MoS2 a=3.160,
# c=12.294 -- the small in-plane a (tightest of the TMDs) makes WS2 the
# brightest layered basal line in the catalog. M-S bond ~2.41 A.
[ws2]
system = "hexagonal"
a = 3.153
c = 12.323
basis = [
    { element = "W",  pos = [0.3333333333333333, 0.6666666666666667, 0.25] },
    { element = "S",  pos = [0.6666666666666667, 0.3333333333333333, 0.379] },
    { element = "S",  pos = [0.6666666666666667, 0.3333333333333333, 0.121] },
    { element = "W",  pos = [0.6666666666666667, 0.3333333333333333, 0.75] },
    { element = "S",  pos = [0.3333333333333333, 0.6666666666666667, 0.879] },
    { element = "S",  pos = [0.3333333333333333, 0.6666666666666667, 0.621] },
]

