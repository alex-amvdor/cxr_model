# AB-stacked (Bernal) highly-oriented pyrolytic graphite, 4 atoms per cell.
[hopg]
system = "hexagonal"
a = 2.461
c = 6.711
basis = [
    { element = "C", pos = [0.000000, 0.000000, 0.0] },
    { element = "C", pos = [0.3333333333333333, 0.6666666666666667, 0.0] },
    { element = "C", pos = [0.000000, 0.000000, 0.5] },
    { element = "C", pos = [0.6666666666666667, 0.3333333333333333, 0.5] },
]

# 2H-MoSe2 (P6_3/mmc): Mo on Wyckoff 2c (1/3,2/3,1/4) -- symmetry-fixed; Se on
# 4f with the single free parameter z = 0.621 (standard setting, paired with
# the Mo at z = 3/4), i.e. Se offset delta = |0.75 - 0.621| = 0.129 from its
# Mo plane. Consistent with the refined Mo-Se bond length 2.53 A
# (Materials Project mp-1634): sqrt((a/sqrt(3))^2 + (0.129 c)^2) = 2.53 A.
# (The previous basis used delta = 0.121 from a misread of the 4f convention.)
[mose2]
system = "hexagonal"
a = 3.289
c = 12.927
basis = [
    { element = "Mo", pos = [0.3333333333333333, 0.6666666666666667, 0.25] },
    { element = "Se", pos = [0.6666666666666667, 0.3333333333333333, 0.379] },
    { element = "Se", pos = [0.6666666666666667, 0.3333333333333333, 0.121] },
    { element = "Mo", pos = [0.6666666666666667, 0.3333333333333333, 0.75] },
    { element = "Se", pos = [0.3333333333333333, 0.6666666666666667, 0.879] },
    { element = "Se", pos = [0.3333333333333333, 0.6666666666666667, 0.621] },
]

# 2H-WSe2 (P6_3/mmc): isostructural with MoSe2 -- W on Wyckoff 2c (1/3,2/3,1/4),
# Se on 4f with z = 0.621 (delta = |0.75 - 0.621| = 0.129 from its W plane).
# Experimental lattice a = 3.282, c = 12.96 A (Schutte, De Boer & Jellinek,
# J. Solid State Chem. 70, 207 (1987); Materials Project mp-1821). The W-Se bond
# sqrt((a/sqrt(3))^2 + (0.129 c)^2) = 2.53 A matches the refined value.
[wse2]
system = "hexagonal"
a = 3.282
c = 12.96
basis = [
    { element = "W",  pos = [0.3333333333333333, 0.6666666666666667, 0.25] },
    { element = "Se", pos = [0.6666666666666667, 0.3333333333333333, 0.379] },
    { element = "Se", pos = [0.6666666666666667, 0.3333333333333333, 0.121] },
    { element = "W",  pos = [0.6666666666666667, 0.3333333333333333, 0.75] },
    { element = "Se", pos = [0.3333333333333333, 0.6666666666666667, 0.879] },
    { element = "Se", pos = [0.3333333333333333, 0.6666666666666667, 0.621] },
]

# 2H-MoTe2 (alpha-MoTe2, semiconducting; P6_3/mmc) -- isostructural with MoSe2:
# Mo on Wyckoff 2c (1/3,2/3,1/4), Te on 4f with z = 0.621 (delta = |0.75 - 0.621|
# = 0.129 from its Mo plane). Lattice a = 3.519, c = 13.964 A (Puotinen & Newnham,
# Acta Cryst. 14, 691 (1961); Materials Project mp-602). The Mo-Te bond
# sqrt((a/sqrt(3))^2 + (0.129 c)^2) = 2.72 A matches the refined ~2.73 A.
[mote2]
system = "hexagonal"
a = 3.519
c = 13.964
basis = [
    { element = "Mo", pos = [0.3333333333333333, 0.6666666666666667, 0.25] },
    { element = "Te", pos = [0.6666666666666667, 0.3333333333333333, 0.379] },
    { element = "Te", pos = [0.6666666666666667, 0.3333333333333333, 0.121] },
    { element = "Mo", pos = [0.6666666666666667, 0.3333333333333333, 0.75] },
    { element = "Te", pos = [0.3333333333333333, 0.6666666666666667, 0.879] },
    { element = "Te", pos = [0.3333333333333333, 0.6666666666666667, 0.621] },
]

# 1T (CdI2-type, P-3m1) metal dichalcogenides: heavy metal on Wyckoff 1a (0,0,0)
# -- AT THE ORIGIN, so every (00l) stays strong (unlike the 2H TMDs where the
# metal at z=1/4,3/4 makes them oscillate) -- and chalcogen on 2d (1/3,2/3,z),
# (2/3,1/3,1-z) with z ~ 0.255. One layer per cell, so c is the interlayer
# repeat. Bond sqrt((a/sqrt(3))^2 + (z c)^2) ~ 2.5 A.
[ptse2]
system = "hexagonal"
a = 3.728
c = 5.081
basis = [
    { element = "Pt", pos = [0.0, 0.0, 0.0] },
    { element = "Se", pos = [0.3333333333333333, 0.6666666666666667, 0.255] },
    { element = "Se", pos = [0.6666666666666667, 0.3333333333333333, 0.745] },
]

